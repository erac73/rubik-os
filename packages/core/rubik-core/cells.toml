critical = true
depends = ["F0.0"]
order = 0

[cell.F1.1]
name = "systemd-minimal"
type = "systemd"
unit = "systemd-journald"
depends = ["F1.0"]
order = 1

[cell.F1.2]
name = "cgroup-manager"
type = "script"
exec = "/usr/lib/rubik/cells/cgroup-manager.sh"
depends = ["F1.0"]
order = 2

[cell.F1.3]
name = "sched-tune"
type = "script"
exec = "/usr/lib/rubik/cells/sched-tune.sh"
depends = ["F1.0"]
order = 3

[cell.F1.4]
name = "service-watcher"
type = "timer"
unit = "rubik-cell@service-watcher"
timer = "*-*-* *:*:00/15"
depends = ["F1.1"]
order = 4

[cell.F1.5]
name = "cron-minimal"
type = "systemd"
unit = "rubik-cell@cron-minimal"
depends = ["F1.1"]
order = 5

[cell.F1.6]
name = "log-forwarder"
type = "systemd"
unit = "systemd-journald"
depends = ["F1.1"]
order = 6

[cell.F1.7]
name = "initramfs"
type = "oneshot"
unit = "rubik-cell@initramfs"
exec = "/usr/lib/rubik/cells/initramfs.sh"
order = -1

[cell.F1.8]
name = "power-manager"
type = "systemd"
unit = "rubik-cell@power-manager"
depends = ["F0.7"]
order = 8

