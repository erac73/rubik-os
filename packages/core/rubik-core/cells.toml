# ───────────────────────────────────────────────
# Rubik OS — Cell Definition File
# Each cell is an atomic, composable component.
# ───────────────────────────────────────────────

[cell.F0.0]
name = "kernel"
type = "systemd"
unit = "rubik-cell@kernel"
critical = true
order = 0

[cell.F0.1]
name = "memory-compression"
type = "script"
exec = "/usr/lib/rubik/cells/memory-compression.sh"
depends = ["F0.0"]
order = 1

[cell.F0.2]
name = "swap-manager"
type = "sd-swap"
unit = "systemd-swap"
depends = ["F0.0"]
order = 2

[cell.F0.3]
name = "oom-guard"
type = "systemd"
unit = "rubik-cell@oom-guard"
depends = ["F0.0"]
order = 3

[cell.F0.4]
name = "hugepages"
type = "script"
exec = "/usr/lib/rubik/cells/hugepages.sh"
depends = ["F0.0"]
order = 4

[cell.F0.5]
name = "cache-tune"
type = "script"
exec = "/usr/lib/rubik/cells/cache-tune.sh"
depends = ["F0.0"]
order = 5

[cell.F0.6]
name = "irq-balance"
type = "systemd"
unit = "irqbalance"
depends = ["F0.0"]
order = 6

[cell.F0.7]
name = "cpu-gov"
type = "script"
exec = "/usr/lib/rubik/cells/cpu-gov.sh"
depends = ["F0.0"]
order = 7

[cell.F0.8]
name = "mem-forecast"
type = "systemd"
unit = "rubik-cell@mem-forecast"
depends = ["F0.0"]
order = 8

# ── Face 1 — Process & Services ─────────────────

[cell.F1.0]
name = "rubikd"
type = "systemd"
