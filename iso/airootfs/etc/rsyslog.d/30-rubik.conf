# Rubik OS logging configuration
# Each face logs to its own file for cell-level observability

# Face 0 - Kernel & Memory
:syslogtag, contains, "rubik-face0"   /var/log/rubik/face-0.log
:syslogtag, contains, "rubik-cell-kernel" /var/log/rubik/cell-kernel.log
:syslogtag, contains, "rubik-cell-memory" /var/log/rubik/cell-memory.log

# Face 1 - Process & Services
:syslogtag, contains, "rubik-face1"   /var/log/rubik/face-1.log
:syslogtag, contains, "rubik-cell-"   /var/log/rubik/cells.log

# Face 2 - Storage
:syslogtag, contains, "rubik-face2"   /var/log/rubik/face-2.log

# Face 3 - Network
:syslogtag, contains, "rubik-face3"   /var/log/rubik/face-3.log

# Face 4 - UI & UX
:syslogtag, contains, "rubik-face4"   /var/log/rubik/face-4.log

# Face 5 - Security
:syslogtag, contains, "rubik-face5"   /var/log/rubik/face-5.log

# Orchestrator
:syslogtag, contains, "rubikd"        /var/log/rubik/orchestrator.log

# Rotate daily, keep 7 days
$outchannel log_rubik,/var/log/rubik/cells.log, 10485760, /usr/bin/logrotate
