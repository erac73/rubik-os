# ───────────────────────────────────────────────
# Rubik OS Memory Optimization — sysctl
# ───────────────────────────────────────────────

# ── Swap ────────────────────────────────────────
# Only swap when absolutely necessary
vm.swappiness = 10
# Keep cache as long as possible
vm.vfs_cache_pressure = 50
# Prefer reclaiming anonymous pages over file cache
vm.page_cluster = 0

# ── Dirty Page Ratio ────────────────────────────
# Lower values = less writeback buildup = better for low-RAM
vm.dirty_ratio = 10
vm.dirty_background_ratio = 3
# Writeback older pages first (default 3000 = 30s)
vm.dirty_expire_centisecs = 3000
# Background writeback interval (default 500 = 5s)
vm.dirty_writeback_centisecs = 500

# ── Watermarks ──────────────────────────────────
# More aggressive watermark for low-RAM systems
# Scale factor: higher = more aggressive kswapd
vm.watermark_scale_factor = 150
# Disable boost factor (huge latency spikes)
vm.watermark_boost_factor = 0
# Min free (calculated as 1% of RAM in rubik-init)
# vm.min_free_kbytes = 16384  (set dynamically)

# ── OOM ─────────────────────────────────────────
# Lower OOM killing delay
vm.oom_dump_tasks = 1
# Kernel panic on OOM (0 = kill, 1 = panic)
vm.panic_on_oom = 0

# ── THP (Transparent Hugepages) ─────────────────
# Only use THP when explicitly requested via madvise
# More stable than 'always', saves memory
# Set at runtime: echo madvise > /sys/kernel/mm/transparent_hugepage/enabled
# Not a sysctl but documented here

# ── Network Memory ──────────────────────────────
# Smaller buffers for low-RAM (defaults are for servers)
net.core.rmem_default = 65536
net.core.wmem_default = 65536
net.core.rmem_max = 262144
net.core.wmem_max = 262144
# TCP auto-tuning lower bounds
net.ipv4.tcp_rmem = 4096 131072 262144
net.ipv4.tcp_wmem = 4096 65536 131072
# Don't cache TCP metrics
net.ipv4.tcp_no_metrics_save = 1
# Reduce keepalive overhead
net.ipv4.tcp_keepalive_time = 7200
net.ipv4.tcp_keepalive_intvl = 75
net.ipv4.tcp_keepalive_probes = 9

# ── Kernel General ──────────────────────────────
# Reduce kernel timer frequency (100Hz vs 250Hz saves CPU)
# kernel.timer_freq = 100  (set in kernel config, not sysctl)
# Reduce RCU stall timeout
kernel.rcu_cpu_stall_timeout = 60
# Limit core dumps (saves disk+RAM)
kernel.core_pattern = /dev/null
kernel.core_uses_pid = 0
# Disable printk throttling only for critical messages
kernel.printk = 3 3 3 3
# Reduce perf events overhead
kernel.perf_event_max_sample_rate = 5000
kernel.perf_cpu_time_max_percent = 1

# ── Filesystem ──────────────────────────────────
# Increase inotify max (waybar, file watchers need this)
fs.inotify.max_user_watches = 16384
fs.inotify.max_user_instances = 256
# Don't update atime (saves disk I/O + memory)
fs.atime_update_time = 86400
