# ───────────────────────────────────────────────
# Rubik OS — Security Hardening
# ───────────────────────────────────────────────

# ── Kernel Hardening ───────────────────────────
# Restrict kernel log (only root can read)
kernel.dmesg_restrict = 1
# Restrict kernel pointer exposure
kernel.kptr_restrict = 2
# Disable kexec (no kernel replacement at runtime)
kernel.kexec_load_disabled = 1
# Restrict perf events (mitigate side-channel attacks)
kernel.perf_event_paranoid = 3

# ── Network Hardening ──────────────────────────
# Ignore ICMP redirects
net.ipv4.conf.all.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
# Ignore source routing
net.ipv4.conf.all.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
# Ignore ICMP echo broadcasts (smurf attack)
net.ipv4.icmp_echo_ignore_broadcasts = 1
# Enable TCP syncookies (SYN flood protection)
net.ipv4.tcp_syncookies = 1
# Ignore bogus ICMP errors
net.ipv4.icmp_ignore_bogus_error_responses = 1
# Reverse path filtering (strict mode)
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# ── User Namespace Hardening ───────────────────
# Restrict unprivileged user namespaces (critical for container escape)
kernel.unprivileged_userns_clone = 0

# ── ptrace Hardening ───────────────────────────
# Only allow ptrace of own processes (YAMA LSM)
kernel.yama.ptrace_scope = 2

# ── Core Dumps ─────────────────────────────────
# Disable core dumps (can contain sensitive data)
kernel.core_pattern = |/bin/false
fs.suid_dumpable = 0
